spring.application.name=ListItUp

# Database Configuration (overridden by Docker Compose in prod)
spring.datasource.url=jdbc:postgresql://localhost:5432/listitup
spring.datasource.username=listitup_user
spring.datasource.password=listitup_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
# DEV MODE: drops all tables and recreates from entities on every startup
# spring.jpa.hibernate.ddl-auto=create
# PRODUCTION: auto-update schema for new fields
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway — disabled while using ddl-auto=create
# Enable for production alongside ddl-auto=validate
spring.flyway.enabled=false
# spring.flyway.enabled=true
# spring.flyway.locations=classpath:db/migration

# Thymeleaf
spring.thymeleaf.cache=false

# OAuth2 Client Registration - Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
server.forward-headers-strategy=framework
spring.web.forwarded-header-strategy=framework
spring.security.oauth2.client.registration.google.redirect-uri=https://listitup.duckdns.org/login/oauth2/code/google

# OAuth2 Client Registration - GitHub
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:your-github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:your-github-client-secret}
spring.security.oauth2.client.registration.github.scope=user:email,read:user
spring.security.oauth2.client.registration.github.redirect-uri=https://listitup.duckdns.org/login/oauth2/code/github

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=alvaropueblaruisanchez@gmail.com
spring.mail.password=${SMTP_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true

server.error.whitelabel.enabled=false
