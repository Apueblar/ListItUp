spring.application.name=ListItUp

# Database Configuration (overridden by Docker Compose in prod)
spring.datasource.url=jdbc:postgresql://localhost:5432/listitup
spring.datasource.username=listitup_user
spring.datasource.password=listitup_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
# DEV MODE: drops all tables and recreates from entities on every startup
spring.jpa.hibernate.ddl-auto=create
# PRODUCTION: switch to validate + re-enable flyway below
# spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway — disabled while using ddl-auto=create
# Enable for production alongside ddl-auto=validate
spring.flyway.enabled=false
# spring.flyway.enabled=true
# spring.flyway.locations=classpath:db/migration

# Thymeleaf
spring.thymeleaf.cache=false

# OAuth2 Client Registration - Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
server.forward-headers-strategy=framework
spring.web.forwarded-header-strategy=framework
spring.security.oauth2.client.registration.google.redirect-uri=https://listitup.duckdns.org/login/oauth2/code/google
server.error.whitelabel.enabled=false
