<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('Platform Analytics - ListItUp')}"></th:block>
    <link rel="stylesheet" th:href="@{/css/analytics.css}"/>
</head>
<body>

    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="animate-in analytics-main">
        <h1 class="analytics-title">Platform Analytics</h1>

        <div th:if="${#lists.isEmpty(snapshots)}" class="analytics-empty">
            No analytics data available yet. Data is gathered nightly.
        </div>

        <div th:unless="${#lists.isEmpty(snapshots)}">
            <table class="analytics-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Users</th>
                        <th>Lists</th>
                        <th>Total Views</th>
                        <th>Total Likes</th>
                        <th>Total Saves</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="snap : ${snapshots}">
                        <td th:text="${#temporals.format(snap.snapshotDate, 'dd MMM yyyy')}">Date</td>
                        <td th:text="${snap.totalUsers}">0</td>
                        <td th:text="${snap.totalLists}">0</td>
                        <td th:text="${snap.totalViews}">0</td>
                        <td th:text="${snap.totalLikes}">0</td>
                        <td th:text="${snap.totalSaves}">0</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
