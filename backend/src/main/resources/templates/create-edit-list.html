<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('Create List - ListItUp')}"></th:block>
    <style>
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        input[type="text"], textarea, select {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-sm);
            color: var(--text-primary);
            font-family: var(--font-family);
            transition: all 0.3s ease;
        }
        input[type="text"]:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }
        .editor-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="animate-in">
        <div class="editor-container">
            <h1 style="text-align: center; margin-bottom: 2rem;">Create a New List</h1>
            
            <form action="/lists" method="POST">
                <div class="form-group">
                    <label for="title">List Title</label>
                    <input type="text" id="title" name="title" placeholder="e.g. My Favorite Sci-Fi Novels" required>
                </div>
                
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="3" placeholder="Tell people what this list is about..."></textarea>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="categoryId" required>
                        <option value="">Select a category</option>
                        <option th:each="cat : ${categories}" th:value="${cat.categoryId}" th:text="${cat.name}"></option>
                    </select>
                </div>
                
                <hr style="border: none; border-top: 1px solid var(--glass-border); margin: 2rem 0;">
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3>List Items</h3>
                    <button type="button" id="add-item-btn" class="btn-primary" style="padding: 0.4rem 0.8rem; font-size: 0.9rem;">+ Add Item</button>
                </div>
                
                <div id="items-container">
                    <!-- Dynamic items will be appended here -->
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; font-size: 1.1rem; padding: 1rem; margin-top: 2rem;">Publish List</button>
            </form>
        </div>
    </main>

    <script>
        let itemIndex = 0;
        const container = document.getElementById('items-container');
        const addBtn = document.getElementById('add-item-btn');

        function createItemRow() {
            const div = document.createElement('div');
            div.className = 'form-group';
            div.style.background = 'rgba(255,255,255,0.02)';
            div.style.padding = '1rem';
            div.style.borderRadius = '8px';
            div.style.border = '1px solid var(--glass-border)';
            div.style.marginBottom = '1rem';
            div.style.position = 'relative';

            div.innerHTML = `
                <button type="button" class="remove-btn" style="position:absolute; right:1rem; top:1rem; background:transparent; border:none; color:var(--text-secondary); cursor:pointer; font-size:1.2rem;">&times;</button>
                <div style="margin-bottom:0.5rem;">
                    <label>Item Title</label>
                    <input type="text" name="items[${itemIndex}].title" placeholder="e.g. The Matrix" required>
                </div>
                <div style="margin-bottom:0.5rem;">
                    <label>Description</label>
                    <textarea name="items[${itemIndex}].description" rows="2" placeholder="Why is this on your list?"></textarea>
                </div>
                <div>
                    <label>External URL (Optional)</label>
                    <input type="text" name="items[${itemIndex}].externalUrl" placeholder="https://...">
                </div>
            `;
            
            div.querySelector('.remove-btn').addEventListener('click', () => {
                div.remove();
            });

            container.appendChild(div);
            itemIndex++;
        }

        addBtn.addEventListener('click', createItemRow);
        
        // Start with one item
        createItemRow();
    </script>
    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
