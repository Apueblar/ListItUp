<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{fragments/layout :: head('Create List - ListItUp')}"></th:block>
    <link rel="stylesheet" th:href="@{/css/create-edit-list.css}"/>
</head>
<body>

    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="animate-in">
        <div class="editor-container">
            <h1 class="editor-title" th:text="${list != null} ? 'Edit List' : 'Create a New List'">Create a New List</h1>
            
            <form th:action="${list != null} ? @{/lists/{id}/edit(id=${list.listId})} : @{/lists}" method="POST">
                <div class="form-group">
                    <label for="title">List Title</label>
                    <input type="text" id="title" name="title" th:value="${list != null ? list.title : ''}" placeholder="e.g. My Favorite Sci-Fi Novels" required/>
                </div>
                
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="3" th:text="${list != null ? list.description : ''}" placeholder="Tell people what this list is about..."></textarea>
                </div>

                <div class="form-group">
                    <label for="category" style="display:flex; justify-content:space-between; align-items:center;">
                        <span>Category</span>
                        <a href="javascript:void(0)" id="propose-category-link" style="font-size:0.8rem; font-weight:normal; color:var(--primary-color); text-decoration:none;">Can't find it? Propose a new one</a>
                    </label>
                    <select id="category" name="categoryId" required>
                        <option value="">Select a category</option>
                        <option th:each="cat : ${categories}" th:value="${cat.categoryId}" th:text="${cat.name}" th:selected="${list != null and list.category.categoryId == cat.categoryId}"></option>
                    </select>
                    <div id="propose-category-container" style="display:none; margin-top:0.75rem; background:var(--surface-color); padding:1rem; border-radius:8px; border:1px dashed var(--border-color);">
                        <label for="proposedCategoryName" style="font-size:0.9rem; font-weight:bold;">Proposed Category Name</label>
                        <div style="display:flex; gap:0.5rem; margin-top:0.25rem;">
                            <input type="text" id="proposedCategoryName" placeholder="e.g. Science" style="flex:1; padding:0.5rem; border-radius:6px; border:1px solid var(--border-color); background:var(--bg-color); color:var(--text-color);">
                            <button type="button" id="submit-proposal-btn" class="btn-primary" style="padding:0.5rem 1rem;">Submit</button>
                        </div>
                        <p id="proposal-feedback" style="margin-top:0.5rem; font-size:0.85rem; display:none;"></p>
                    </div>
                </div>

                <div class="form-group">
                    <label for="coverPhoto">Cover Photo (Optional)</label>
                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                        <input type="text" id="coverPhoto" name="coverPhoto" th:value="${list != null ? list.coverPhoto : ''}" placeholder="https://..." style="flex: 1;" />
                        <span style="font-weight: bold;">OR</span>
                        <input type="file" id="coverPhotoFile" accept="image/*" class="file-upload-input" data-target="coverPhoto" />
                    </div>
                </div>
                
                <hr class="editor-divider">
                
                <div class="items-header">
                    <h3>List Items</h3>
                    <button type="button" id="add-item-btn" class="btn-primary btn-add-item">+ Add Item</button>
                </div>
                
                <div id="items-container">
                    <!-- Dynamic items will be appended here -->
                    <th:block th:if="${list != null}">
                        <div th:each="item, stat : ${list.items}" class="item-row">
                            <button type="button" class="btn-remove-item" aria-label="Remove item" onclick="this.parentElement.remove();">&times;</button>
                            <div class="item-row-field">
                                <label>Item Title</label>
                                <input type="text" th:name="'items[' + ${stat.index} + '].title'" th:value="${item.title}" required/>
                            </div>
                            <div class="item-row-field">
                                <label>Description</label>
                                <textarea th:name="'items[' + ${stat.index} + '].description'" rows="2" th:text="${item.description}"></textarea>
                            </div>
                            <div class="item-row-field">
                                <label>Photo (Optional)</label>
                                <div style="display: flex; gap: 0.5rem; align-items: center;">
                                    <input type="text" th:name="'items[' + ${stat.index} + '].photo'" th:value="${item.photo}" th:id="'item-photo-' + ${stat.index}" style="flex: 1;" />
                                    <span style="font-weight: bold;">OR</span>
                                    <input type="file" accept="image/*" class="file-upload-input" th:attr="data-target='item-photo-' + ${stat.index}" />
                                </div>
                            </div>
                            <div class="item-row-field">
                                <label>External URL (Optional)</label>
                                <input type="text" th:name="'items[' + ${stat.index} + '].externalUrl'" th:value="${item.externalUrl}" />
                            </div>
                        </div>
                    </th:block>
                </div>

                <button type="submit" class="btn-primary btn-submit-list" th:text="${list != null} ? 'Save Changes' : 'Publish List'">Publish List</button>
            </form>
        </div>
    </main>

    <script th:src="@{/js/create-edit-list.js}"></script>
    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
