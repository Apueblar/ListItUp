<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head(${list.title + ' - ListItUp'})}"></th:block>
    <style>
        .list-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .item-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1.5rem;
            align-items: flex-start;
        }
        .rank-badge {
            background: var(--accent-color);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            flex-shrink: 0;
            box-shadow: var(--shadow-glow);
        }
        .item-content {
            flex: 1;
        }
        .item-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        .item-desc {
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
        .item-link {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }
        .item-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="animate-in" style="max-width: 800px;">
        <header class="list-header">
            <span class="category-pill" th:text="${list.category.name}" style="margin-bottom: 1rem;">Category</span>
            <h1 th:text="${list.title}">List Title</h1>
            <p th:text="${list.description}" style="color: var(--text-secondary); margin-bottom: 1rem;">List description</p>
            <div style="font-size: 0.9rem; color: var(--text-secondary);">
                By <span th:text="${list.creator.username}" style="color: var(--text-primary);">Creator</span> • 
                <span th:text="${list.viewCount}">0</span> views
            </div>
            
            <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
                <button id="btn-like" class="btn-primary" style="background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); min-width: 100px;">🤍 Like</button>
                <button id="btn-save" class="btn-primary" style="background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); min-width: 100px;">🔖 Save</button>
            </div>
        </header>

        <section class="items-container">
            <div th:each="item, iterStat : ${list.items}" class="item-card">
                <div class="rank-badge" th:text="${iterStat.count}">1</div>
                <div class="item-content">
                    <h3 class="item-title" th:text="${item.title}">Item Title</h3>
                    <p class="item-desc" th:text="${item.description}">Item description goes here...</p>
                    <a th:if="${item.externalUrl != null}" th:href="${item.externalUrl}" target="_blank" class="item-link">Visit Link →</a>
                </div>
            </div>
            
            <div th:if="${#lists.isEmpty(list.items)}" style="text-align: center; padding: 2rem; color: var(--text-secondary);">
                This list doesn't have any items yet.
            </div>
        </section>

        <!-- Comments Section -->
        <section style="margin-top: 3rem; border-top: 1px solid var(--glass-border); padding-top: 2rem;">
            <h2>Comments</h2>
            
            <div th:if="${#authorization.expression('isAuthenticated()')}" style="margin-bottom: 2rem; margin-top: 1rem;">
                <form th:action="@{/lists/{id}/comments(id=${list.listId})}" method="POST" style="display:flex; gap:1rem;">
                    <input type="text" name="text" placeholder="Add a comment..." required style="flex:1; padding:0.8rem; background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); border-radius:8px; color:white;">
                    <button type="submit" class="btn-primary">Post</button>
                </form>
            </div>
            
            <div th:unless="${#authorization.expression('isAuthenticated()')}" style="margin-bottom: 2rem; margin-top: 1rem; color:var(--text-secondary);">
                <a href="/oauth2/authorization/google" style="color:var(--accent-color);">Sign in</a> to leave a comment.
            </div>

            <div th:each="comment : ${comments}" style="background: var(--glass-bg); padding: 1rem; border-radius: 8px; border: 1px solid var(--glass-border); margin-bottom: 1rem;">
                <div style="font-weight: bold; margin-bottom: 0.5rem; color: var(--accent-color);" th:text="${comment.author.username}">Author</div>
                <div style="color: var(--text-primary);" th:text="${comment.text}">Comment text</div>
                <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem;" th:text="${#temporals.format(comment.createdAt, 'dd MMM yyyy HH:mm')}">Date</div>
            </div>
            
            <div th:if="${#lists.isEmpty(comments)}" style="color: var(--text-secondary); text-align: center; margin-top: 2rem;">
                No comments yet. Be the first to comment!
            </div>
        </section>
    </main>

    <!-- Interactions JS -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        const listId = /*[[${list.listId}]]*/ 'null';
        const csrfToken = document.cookie.replace(/(?:(?:^|.*;\s*)XSRF-TOKEN\s*\=\s*([^;]*).*$)|^.*$/, "$1"); // If CSRF is enabled via cookie
        /*]]>*/
        
        async function toggleInteraction(endpoint, btnId, activeText, inactiveText) {
            try {
                const response = await fetch(`/lists/${listId}/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const btn = document.getElementById(btnId);
                    if (data.status.includes('un')) {
                        btn.textContent = inactiveText;
                        btn.style.background = 'rgba(255,255,255,0.1)';
                    } else {
                        btn.textContent = activeText;
                        btn.style.background = 'var(--accent-color)';
                    }
                } else if (response.status === 401 || response.status === 403) {
                    window.location.href = '/oauth2/authorization/google';
                }
            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('btn-like').addEventListener('click', () => toggleInteraction('like', 'btn-like', '❤️ Liked', '🤍 Like'));
        document.getElementById('btn-save').addEventListener('click', () => toggleInteraction('save', 'btn-save', '🏷️ Saved', '🔖 Save'));
    </script>
    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
