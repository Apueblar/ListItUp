<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Out - ListItUp</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.08) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            max-width: 480px;
            width: 100%;
        }

        .logout-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 3rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .icon-container {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            display: inline-block;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            border: 1px solid var(--card-border);
            line-height: 1;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.875rem 2rem;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .btn-logout {
            background-color: var(--danger);
            color: white;
            box-shadow: 0 4px 14px 0 var(--danger-glow);
        }

        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 var(--danger-glow);
            filter: brightness(1.1);
        }

        .btn-cancel {
            background-color: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--card-border);
        }

        .btn-cancel:hover {
            background-color: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logout-card">
            <div class="icon-container">🚪</div>
            <h1>Log Out</h1>
            <p>Are you sure you want to log out of your ListItUp account?</p>
            
            <div class="btn-group">
                <!-- Thymeleaf form automatically embeds the CSRF token -->
                <form th:action="@{/perform_logout}" method="post" style="width: 100%;">
                    <button type="submit" class="btn btn-logout" style="width: 100%;">Yes, Log Out</button>
                </form>
                <a href="/feed" class="btn btn-cancel">Cancel</a>
            </div>
        </div>
    </div>
</body>
</html>
