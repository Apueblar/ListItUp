<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{fragments/layout :: head(${user.username + ' - Profile'})}"></th:block>
    <link rel="stylesheet" th:href="@{/css/profile.css}"/>
</head>
<body>

    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="animate-in">
        <header class="profile-own-header">
            <div class="profile-own-avatar">
                <img th:if="${user.profilePicture != null and !user.profilePicture.isEmpty()}" th:src="${user.profilePicture}" alt="Avatar" style="width:100%; height:100%; border-radius:50%; object-fit:cover;" />
                <span th:unless="${user.profilePicture != null and !user.profilePicture.isEmpty()}" th:text="${#strings.substring(user.username,0,1).toUpperCase()}">U</span>
            </div>
            <h1 class="section-heading" th:text="${user.username}" style="margin-bottom: 0.5rem;">Username</h1>
            <p class="profile-own-role" th:text="${'Role: ' + user.role}">Role</p>
            <p th:if="${user.bio != null and !user.bio.isEmpty()}" th:text="${user.bio}" style="margin-top:0.5rem; max-width:600px; margin-left:auto; margin-right:auto; color:var(--text-secondary);"></p>
            <div th:if="${profileSuccess}" style="color: #4ade80; margin-top: 1rem;" th:text="${profileSuccess}"></div>
        </header>

        <section class="profile-section" style="max-width: 600px; margin: 0 auto 3rem auto; background: var(--card-bg); padding: 2rem; border-radius: 12px; border: 1px solid var(--card-border);">
            <h2 class="section-heading" style="text-align: left; font-size: 1.2rem; margin-bottom: 1rem;">Edit Profile</h2>
            <form th:action="@{/profile/update-avatar}" method="post" style="margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="font-weight: 500;">Profile Picture URL</label>
                <div style="display: flex; gap: 1rem;">
                    <input type="text" name="profilePicture" th:value="${user.profilePicture}" placeholder="https://..." style="flex: 1; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--card-border); background: rgba(0,0,0,0.2); color: var(--text-primary);" />
                    <button type="submit" class="btn-primary" style="padding: 0.75rem 1.5rem;">Save</button>
                </div>
            </form>
            <form th:action="@{/profile/update-bio}" method="post" style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="font-weight: 500;">Bio</label>
                <textarea name="bio" rows="3" placeholder="Tell us about yourself..." style="padding: 0.75rem; border-radius: 8px; border: 1px solid var(--card-border); background: rgba(0,0,0,0.2); color: var(--text-primary); resize: vertical;" th:text="${user.bio}"></textarea>
                <button type="submit" class="btn-primary" style="align-self: flex-start; margin-top: 0.5rem; padding: 0.75rem 1.5rem;">Save Bio</button>
            </form>
        </section>

        <section class="profile-section">
            <h2 class="section-heading">My Created Lists</h2>
            <div class="grid">
                <a th:each="list : ${myLists}" th:href="@{/lists/{id}(id=${list.listId})}" class="list-card">
                    <div>
                        <span class="category-pill" th:text="${list.category.name}">Category</span>
                        <span th:if="${list.isPinned}" class="pinned-badge" style="margin-left: 0.5rem;">📌 Pinned</span>
                    </div>
                    <h3 th:text="${list.title}">Title</h3>
                    <p class="card-desc" th:text="${list.description}">Desc</p>
                    <div class="card-footer-row">
                        <span th:text="${list.viewCount + ' views'}">0 views</span>
                        <span th:text="${#temporals.format(list.createdAt, 'dd MMM yyyy')}">Date</span>
                    </div>
                </a>
                <div th:if="${#lists.isEmpty(myLists)}" class="empty-grid-msg">You haven't created any lists yet.</div>
            </div>
        </section>

        <section class="profile-section">
            <h2 class="section-heading">My Saved Lists</h2>
            <div class="grid">
                <a th:each="list : ${savedLists}" th:href="@{/lists/{id}(id=${list.listId})}" class="list-card">
                    <div><span class="category-pill" th:text="${list.category.name}">Category</span></div>
                    <h3 th:text="${list.title}">Title</h3>
                    <p class="card-desc" th:text="${list.description}">Desc</p>
                    <div class="card-footer-row">
                        <span th:text="${'By ' + list.creator.username}">Creator</span>
                    </div>
                </a>
                <div th:if="${#lists.isEmpty(savedLists)}" class="empty-grid-msg">No saved lists. Go explore!</div>
            </div>
        </section>

        <section class="profile-section">
            <h2 class="section-heading">My Liked Lists</h2>
            <div class="grid">
                <a th:each="list : ${likedLists}" th:href="@{/lists/{id}(id=${list.listId})}" class="list-card">
                    <div><span class="category-pill" th:text="${list.category.name}">Category</span></div>
                    <h3 th:text="${list.title}">Title</h3>
                    <p class="card-desc" th:text="${list.description}">Desc</p>
                    <div class="card-footer-row">
                        <span th:text="${'By ' + list.creator.username}">Creator</span>
                    </div>
                </a>
                <div th:if="${#lists.isEmpty(likedLists)}" class="empty-grid-msg">No liked lists. Go explore!</div>
            </div>
        </section>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
