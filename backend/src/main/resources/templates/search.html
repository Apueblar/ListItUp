<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Lists - ListItUp</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <nav>
        <a href="/" class="nav-brand">List<span>It</span>Up</a>
        <div class="nav-links">
            <a href="/search" style="color:var(--text-secondary); text-decoration:none;">Search</a>
            <!-- Displayed if ADMIN or VERIFIED -->
            <a th:if="${#authorization.expression('hasAnyRole(''ADMIN'', ''VERIFIED'')')}" href="/lists/new" class="btn-primary">+ Create List</a>
            <!-- Admin Panel Link -->
            <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}" href="/admin" class="btn-primary" style="background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);">Admin Panel</a>
            <a th:if="${#authorization.expression('isAuthenticated()')}" href="/logout" style="color:var(--text-secondary); text-decoration:none;">Logout</a>
            <!-- Displayed if NOT authenticated -->
            <a th:unless="${#authorization.expression('isAuthenticated()')}" href="/oauth2/authorization/google" class="btn-primary">Sign In</a>
        </div>
    </nav>

    <main class="animate-in">
        <header style="text-align: center; margin-bottom: 3rem;">
            <h1>Search Curated Lists</h1>
            <div style="max-width: 600px; margin: 1.5rem auto 0 auto;">
                <form action="/search" method="get" style="display: flex; gap: 0.5rem; justify-content: center;">
                    <input type="text" name="q" th:value="${query}" placeholder="Search lists by title..." 
                           style="flex: 1; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--card-border); background: var(--card-bg); color: var(--text-primary); font-family: inherit; font-size: 1rem; outline: none; transition: border-color 0.2s;" />
                    <button type="submit" class="btn-primary" style="border: none; cursor: pointer; font-size: 1rem; padding: 0 1.5rem;">Search</button>
                </form>
            </div>
        </header>

        <section class="grid">
            <!-- Iterate over search results -->
            <a th:each="list : ${results}" th:href="@{/lists/{id}(id=${list.listId})}" class="list-card">
                <div>
                    <span class="category-pill" th:text="${list.category.name}">Category</span>
                </div>
                <h3 th:text="${list.title}" style="font-size: 1.25rem;">Title</h3>
                <p th:text="${list.description}" style="color: var(--text-secondary); font-size: 0.95rem;">
                    Description...
                </p>
                <div style="margin-top: auto; display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-secondary);">
                    <span th:text="${'Views: ' + list.viewCount}">Views: 0</span>
                    <span th:text="${#temporals.format(list.createdAt, 'dd MMM yyyy')}">Date</span>
                </div>
            </a>
            
            <!-- Message if no results -->
            <div th:if="${#lists.isEmpty(results) and query != null and !query.isEmpty()}" style="text-align: center; grid-column: 1 / -1; padding: 4rem;">
                <p style="color: var(--text-secondary);">No lists match your search query: <strong th:text="${query}"></strong></p>
            </div>
            
            <!-- Default message when search page is loaded but no query is run yet -->
            <div th:if="${query == null or query.isEmpty()}" style="text-align: center; grid-column: 1 / -1; padding: 4rem;">
                <p style="color: var(--text-secondary);">Type a keyword above to find curated lists.</p>
            </div>
        </section>
    </main>

</body>
</html>
