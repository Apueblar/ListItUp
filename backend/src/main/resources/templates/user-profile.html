<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{fragments/layout :: head(${profileUser.username + ' - Profile'})}"></th:block>
    <link rel="stylesheet" th:href="@{/css/user-profile.css}"/>
</head>
<body>

    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="animate-in profile-container">
        <header class="profile-header">
            <div class="profile-avatar-wrapper">
                <div class="profile-avatar">
                    <img th:if="${profileUser.profilePicture != null and !profileUser.profilePicture.isEmpty()}" th:src="${profileUser.profilePicture}" alt="Avatar" style="width:100%; height:100%; border-radius:50%; object-fit:cover;" />
                    <span th:unless="${profileUser.profilePicture != null and !profileUser.profilePicture.isEmpty()}" th:text="${#strings.substring(profileUser.username, 0, 1).toUpperCase()}">U</span>
                </div>
                <!-- Verification badge inside the avatar wrapper if user is verified -->
                <div th:if="${profileUser.hasBadge}" class="badge-verified-icon" title="Verified Creator">✓</div>
            </div>
            
            <h1 class="profile-username">
                <span th:text="${profileUser.username}">Username</span>
            </h1>
            <div>
                <span class="profile-role-pill" th:text="${profileUser.role}">STANDARD</span>
            </div>
            
            <div style="margin-top: 1rem; display: flex; justify-content: center; gap: 1rem; align-items: center;">
                <span style="font-weight: bold;" th:text="${followersCount} + ' followers'">0 followers</span>
                
                <th:block th:if="${currentUser != null and currentUser.userId != profileUser.userId}">
                    <button id="btn-follow" class="btn-primary btn-interaction"
                            th:data-username="${profileUser.username}"
                            th:classappend="${isFollowing} ? 'btn-interaction--active' : ''"
                            th:text="${isFollowing} ? 'Following' : 'Follow'">Follow</button>
                </th:block>
            </div>
            
            <p th:if="${profileUser.bio != null and !profileUser.bio.isEmpty()}" th:text="${profileUser.bio}" style="margin-top:1rem; max-width:600px; margin-left:auto; margin-right:auto; color:var(--text-secondary);"></p>
            <p class="profile-joined" th:text="${'Joined ' + #temporals.format(profileUser.createdAt, 'MMMM yyyy')}">Joined May 2026</p>
        </header>

        <section class="profile-lists-section">
            <h2 th:text="${profileUser.username + '’s Lists'}">Lists</h2>
            
            <div class="grid">
                <a th:each="list : ${myLists}" th:href="@{/lists/{id}(id=${list.listId})}" class="list-card">
                    <div>
                        <span class="category-pill" th:text="${list.category.name}">Category</span>
                        <span th:if="${list.isPinned}" class="pinned-badge" style="margin-left: 0.5rem;">📌 Pinned</span>
                    </div>
                    <h3 th:text="${list.title}">Title</h3>
                    <p class="card-desc" th:text="${list.description}">Desc</p>
                    <div class="card-footer-row">
                        <span th:text="${list.viewCount + ' views'}">0 views</span>
                        <span th:text="${#temporals.format(list.createdAt, 'dd MMM yyyy')}">Date</span>
                    </div>
                </a>
            </div>
            
            <div th:if="${#lists.isEmpty(myLists)}" class="empty-grid-msg">
                This user has not created any lists yet.
            </div>
        </section>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var btn = document.getElementById('btn-follow');
            if (btn) {
                btn.addEventListener('click', async function() {
                    var username = btn.getAttribute('data-username');
                    var isFollowing = btn.classList.contains('btn-interaction--active');
                    var method = isFollowing ? 'DELETE' : 'POST';
                    var endpoint = '/users/' + username + '/follow';
                    
                    function getCookie(name) {
                        var value = "; " + document.cookie;
                        var parts = value.split("; " + name + "=");
                        if (parts.length === 2) return parts.pop().split(";").shift();
                    }
                    var xsrfToken = getCookie('XSRF-TOKEN');

                    // Optimistic
                    if (isFollowing) {
                        btn.classList.remove('btn-interaction--active');
                        btn.textContent = 'Follow';
                    } else {
                        btn.classList.add('btn-interaction--active');
                        btn.textContent = 'Following';
                    }

                    try {
                        var response = await fetch(endpoint, {
                            method: method,
                            headers: {
                                'X-XSRF-TOKEN': xsrfToken || ''
                            }
                        });
                        
                        if (!response.ok) {
                            throw new Error('Failed');
                        }
                    } catch(e) {
                        // Revert
                        if (isFollowing) {
                            btn.classList.add('btn-interaction--active');
                            btn.textContent = 'Following';
                        } else {
                            btn.classList.remove('btn-interaction--active');
                            btn.textContent = 'Follow';
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
