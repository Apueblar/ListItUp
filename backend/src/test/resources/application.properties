spring.application.name=ListItUp-Test

# Use in-memory H2 database for testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate Config for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable flyway
spring.flyway.enabled=false

# Mail Configuration Mocked/Disabled
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@test.com
spring.mail.password=test

# OAuth client placeholder registrations to avoid startup failure
spring.security.oauth2.client.registration.google.client-id=mock-client-id
spring.security.oauth2.client.registration.google.client-secret=mock-client-secret
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.github.client-id=mock-client-id
spring.security.oauth2.client.registration.github.client-secret=mock-client-secret
spring.security.oauth2.client.registration.github.redirect-uri=http://localhost:8080/login/oauth2/code/github
spring.security.oauth2.client.registration.github.scope=user:email,read:user
