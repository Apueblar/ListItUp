services:
  db:
    image: postgres:15-alpine
    container_name: listitup_db
    environment:
      POSTGRES_USER: listitup_user
      POSTGRES_PASSWORD: listitup_password
      POSTGRES_DB: listitup
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - listitup_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listitup_user -d listitup"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: listitup_backend
    ports:
      - "8082:8080"
    environment:
      - JAVA_OPTS=-Xmx256m -Xms256m
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/listitup
      - SPRING_DATASOURCE_USERNAME=listitup_user
      - SPRING_DATASOURCE_PASSWORD=listitup_password
      - SPRING_PROFILES_ACTIVE=prod
      # OAuth2 credentials (set via .env file)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - listitup_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

volumes:
  pgdata:

networks:
  listitup_net:
    driver: bridge
